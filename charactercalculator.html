<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Calculator</title>
    <style>
        /* पूरे पेज का बैकग्राउंड */
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            min-height: 100vh; 
            margin: 0; 
          padding-top: 0px;
        }

        /* मुख्य एक ही डिब्बा (Main Single Div) */
        .main-card { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0px 10px 30px rgba(0,0,0,0.1); 
            width: 90%; 
            max-width: 500px; 
            text-align: center;
        }

        h2 { color: #333; margin-bottom: 20px; }

        textarea { 
            width: 100%; 
            height: 150px; 
            border: 2px solid #ddd; 
            border-radius: 10px; 
            padding: 12px; 
            font-family: monospace; 
            box-sizing: border-box; 
            resize: none;
            outline: none;
            transition: 0.3s;
        }

        textarea:focus { border-color: #007bff; }

        button { 
            background: #007bff; 
            color: white; 
            border: none; 
            padding: 12px 25px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            margin-top: 0px; 
            width: 100%;
            font-weight: bold;
        }

        button:hover { background: #0056b3; }

        /* परिणाम वाला हिस्सा भी इसी के अंदर है */
        .result-area { 
            margin-top: 20px; 
            padding-top: 20px; 
            border-top: 1px solid #eee; 
            text-align: left; 
        }

        .stat { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 8px; 
            font-size: 16px; 
            color: #555; 
        }

        .count-num { color: #007bff; font-weight: bold; }
    </style>
</head>
<body>

    <div class="main-card">
        <h2>काउंटर</h2>
        
        <textarea id="userInput" placeholder="अपना कोड यहाँ पेस्ट करें..."></textarea>
        
        <button onclick="calculate()">गणना करें</button>

        <div class="result-area" id="resultDisplay">
            <div class="stat">कुल अक्षर (Strings): <span class="count-num" id="totalChars">0</span></div>
            <div class="stat">बिना स्पेस के: <span class="count-num" id="noSpaceChars">0</span></div>
            <div class="stat">कुल लाइनें: <span class="count-num" id="totalLines">0</span></div>
        </div>
    </div>

    <script>
        function calculate() {
            let text = document.getElementById("userInput").value;

            // गणना
            let total = text.length;
            let noSpace = text.replace(/\s+/g, '').length;
            let lines = text.split("\n").filter(line => line.trim().length > 0).length;

            // स्क्रीन पर दिखाना
            document.getElementById("totalChars").innerText = total;
            document.getElementById("noSpaceChars").innerText = noSpace;
            document.getElementById("totalLines").innerText = lines;
        }
    </script>

</body>
</html>
